services:

    memcached:
      restart: always
      build:
        context: ./memcached
        args:
          - MEMCACHED_VERSION=${MEMCACHED_VERSION}
      volumes:
        - ${DATA_PATH_HOST}/memcached:/var/lib/memcached
      ports:
        - "${MEMCACHED_HOST_PORT}:11211"
      depends_on:
        - php-fpm
      networks:
        - backend
