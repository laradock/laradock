name: Lint shell scripts

# Lints the repo's shell scripts with ShellCheck. Only errors fail the build,
# so it surfaces real bugs (bad quoting, undefined vars) without style noise.

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [ master ]
    paths:
      - '**/*.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error
          ignore_paths: DOCUMENTATION
