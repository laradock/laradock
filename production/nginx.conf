# Laradock — production nginx, in front of the php-fpm 'app' service.
# Framework-agnostic. The ONE line you may change is `root` (see below).

server {
    listen 80;
    server_name _;

    # Laravel / Symfony: public/    WordPress / Moodle / plain PHP: /var/www
    root /var/www/public;
    index index.php index.html;

    client_max_body_size 32M;

    # baseline security headers (tune per app / see .claude web/security rules)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;            # 'app' = php-fpm service (compose & k8s)
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    # block dotfiles but let ACME/Let's Encrypt through
    location ~ /\.(?!well-known).* { deny all; }
}
