# Laradock — Kubernetes reference manifests (a STARTING POINT, not a distro).
#
# Same image you built with production/Dockerfile, pushed to a registry, then:
#   kubectl create secret generic app-env --from-env-file=production/.env
#   kubectl apply -f production/kubernetes.yaml
#
# Set image: below to your pushed image. Managed DB/Redis go in the Secret,
# NOT as pods. Delete the worker/scheduler/migrate blocks you don't need.
#
# ponytail: intentionally plain YAML. If you template a lot of these, graduate
# to a Helm chart or kustomize — but most apps never need to.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx
data:
  default.conf: |
    server {
      listen 80;
      root /var/www/public;           # WP/Moodle/plain PHP: /var/www
      index index.php index.html;
      location / { try_files $uri $uri/ /index.php?$query_string; }
      location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;   # nginx + php-fpm in one pod (sidecar)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
      }
      location ~ /\.(?!well-known).* { deny all; }
    }
---
# App env. In real life create this from your .env:
#   kubectl create secret generic app-env --from-env-file=production/.env
apiVersion: v1
kind: Secret
metadata:
  name: app-env
type: Opaque
stringData:
  APP_ENV: production
  APP_DEBUG: "false"
  DB_HOST: your-managed-db-host
  DB_DATABASE: app
  DB_USERNAME: app
  DB_PASSWORD: change-me
---
# php-fpm + nginx in one pod (nginx as a sidecar talking to 127.0.0.1:9000).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 2
  selector: { matchLabels: { app: app } }
  template:
    metadata: { labels: { app: app } }
    spec:
      containers:
        - name: php-fpm
          image: myapp:latest            # <-- your pushed image
          ports: [{ containerPort: 9000 }]
          envFrom: [{ secretRef: { name: app-env } }]
          # tcp check on the FastCGI port: base-image-agnostic (no pgrep needed) and
          # a truer liveness signal than "is a process named php-fpm alive".
          livenessProbe:
            tcpSocket: { port: 9000 }
            initialDelaySeconds: 10
          readinessProbe:
            tcpSocket: { port: 9000 }
        - name: nginx
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: nginx-conf, mountPath: /etc/nginx/conf.d }
      volumes:
        - name: nginx-conf
          configMap: { name: web-nginx }
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector: { app: app }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  # TLS / controller annotations (e.g. cert-manager.io/cluster-issuer: letsencrypt) go here
spec:
  ingressClassName: nginx
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: app, port: { number: 80 } } }
---
# --- OPTIONAL: queue/messenger worker (Laravel/Symfony). Delete if unused. ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector: { matchLabels: { app: worker } }
  template:
    metadata: { labels: { app: worker } }
    spec:
      containers:
        - name: worker
          image: myapp:latest
          command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
          envFrom: [{ secretRef: { name: app-env } }]
---
# --- OPTIONAL: scheduler/cron (Laravel schedule, Moodle cron). Delete if unused. ---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduler
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: scheduler
              image: myapp:latest
              command: ["php", "artisan", "schedule:run"]
              envFrom: [{ secretRef: { name: app-env } }]
---
# --- OPTIONAL: run DB migrations once per deploy (Laravel/Symfony/Doctrine). ---
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: myapp:latest
          command: ["php", "artisan", "migrate", "--force"]
          envFrom: [{ secretRef: { name: app-env } }]
